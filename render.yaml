services:
  - type: web
    name: astronexus-unified
    env: node
    plan: free
    rootDir: .
    buildCommand: |
      cd backend && npm ci
      cd ../Python/horoscope/astronexus-horoscope && npm ci
      cd ../Python/mati/astro-bot && npm ci
      python3 -m venv Python/birth_chart/astro-nexus-backend/.venv
      Python/birth_chart/astro-nexus-backend/.venv/bin/pip install -r Python/birth_chart/astro-nexus-backend/requirements.txt
    startCommand: cd backend && node index.js
    envVars:
      - key: BIRTH_CHART_SERVICE_URL
        value: http://127.0.0.1:8010
      - key: HOROSCOPE_SERVICE_URL
        value: http://127.0.0.1:4000
      - key: MATI_CHAT_SERVICE_URL
        value: http://127.0.0.1:3000
      - key: UNIFIED_AUTOSTART
        value: "true"
      - key: UNIFIED_PROXY_TIMEOUT_MS
        value: "45000"
      - key: FIREBASE_TYPE
        sync: false
        value: ""
      - key: FIREBASE_PROJECT_ID
        sync: false
        value: ""
      - key: FIREBASE_PRIVATE_KEY_ID
        sync: false
        value: ""
      - key: FIREBASE_PRIVATE_KEY
        sync: false
        value: ""
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
        value: ""
      - key: FIREBASE_CLIENT_ID
        sync: false
        value: ""
      - key: FIREBASE_AUTH_URI
        sync: false
        value: ""
      - key: FIREBASE_TOKEN_URI
        sync: false
        value: ""
      - key: FIREBASE_AUTH_PROVIDER_X509_CERT_URL
        sync: false
        value: ""
      - key: FIREBASE_CLIENT_X509_CERT_URL
        sync: false
        value: ""
